const Icon = ({ name, className = '', size = 16 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide?.icons) {
      const iconData = window.lucide.icons[name];
      if (iconData) {
        ref.current.innerHTML = '';
        const svg = window.lucide.createElement(iconData);
        svg.setAttribute('width', size); svg.setAttribute('height', size);
        ref.current.appendChild(svg);
      }
    }
  }, [name, size]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} style={{width: size, height: size}}/>;
};

// 부드러운 숫자 카운트업
function useCountUp(target, duration = 1000) {
  const [value, setValue] = useState(0);
  useEffect(() => {
    if (target === 0) { setValue(0); return; }
    const start = Date.now();
    const startValue = value;
    const id = setInterval(() => {
      const t = Math.min(1, (Date.now() - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setValue(startValue + (target - startValue) * eased);
      if (t >= 1) clearInterval(id);
    }, 16);
    return () => clearInterval(id);
  }, [target]);
  return value;
}

// === 트랜잭션 처리 모달 (지갑 연결, 바운티 등록) ===
function TransactionModal({ config, onClose }) {
  const [step, setStep] = useState(0);

  useEffect(() => {
    if (step < config.steps.length) {
      const t = setTimeout(() => setStep(s => s + 1), step === 0 ? 800 : step === 1 ? 1200 : 1500);
      return () => clearTimeout(t);
    } else {
      const t = setTimeout(() => config.onComplete(), 800);
      return () => clearTimeout(t);
    }
  }, [step]);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-neutral-900/40 backdrop-blur-sm"/>
      <div className="relative bg-white rounded-3xl max-w-md w-full shadow-2xl fade-up">
        <div className="p-8">
          <div className="mb-6">
            <div className="text-xs uppercase tracking-wider text-neutral-500 mb-1">트랜잭션 처리 중</div>
            <h3 className="font-display text-xl font-bold leading-tight">
              {config.type === 'wallet-connect' ? `${config.walletName} 연결` : config.title}
            </h3>
            {config.amount && <p className="text-sm text-neutral-500 mt-1">{config.amount.toFixed(2)} CONX 잠금</p>}
          </div>

          <div className="space-y-3 mb-5">
            {config.steps.map((s, i) => {
              const isCompleted = step > i;
              const isActive = step === i;
              const isPending = step < i;
              return (
                <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${isActive ? 'bg-blue-50 border-blue-200' : isCompleted ? 'bg-emerald-50/50 border-emerald-100' : 'bg-white border-neutral-100 opacity-50'}`}>
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${isCompleted ? 'bg-emerald-500 text-white' : isActive ? 'bg-blue-500 text-white' : 'bg-neutral-100 text-neutral-400'}`}>
                    {isCompleted ? <Icon name="Check" size={12}/> : isActive ? <Icon name="Loader" size={12} className="animate-spin"/> : <span className="text-[10px] font-bold">{i + 1}</span>}
                  </div>
                  <div className={`text-sm font-medium ${isPending ? 'text-neutral-400' : 'text-neutral-900'}`}>{s.label}</div>
                </div>
              );
            })}
          </div>

          {config.txHash && (
            <div className="p-3 bg-neutral-50 rounded-xl text-xs">
              <div className="flex items-center justify-between mb-1">
                <span className="text-neutral-500 uppercase tracking-wider text-[10px]">Transaction Hash</span>
                <a href="#" className="text-blue-600 hover:underline flex items-center gap-1">
                  Explorer<Icon name="ExternalLink" size={10}/>
                </a>
              </div>
              <div className="font-mono text-neutral-700">{shortHash(config.txHash)}</div>
            </div>
          )}

          {step < config.steps.length && (
            <p className="text-[11px] text-neutral-500 text-center mt-4">⚠️ 데모: 실제 트랜잭션이 아닙니다</p>
          )}
        </div>
      </div>
    </div>
  );
}

// === 정산 모달 - 토큰 분배 시각화 ===

  const bounty = config.bounty;

                      <div className="flex-1 min-w-0">

function DisputeModal({ bounty, onClose, onResolved }) {
  const [step, setStep] = useState(0);
  const [votes, setVotes] = useState([null, null, null]);
  const [result, setResult] = useState(null);

  const startDispute = () => {
    setStep(1);
    setTimeout(() => setVotes([true, null, null]), 1500);
    setTimeout(() => setVotes([true, true, null]), 3200);
    setTimeout(() => {
      const finalVotes = [true, true, false];
      setVotes(finalVotes);
      const won = finalVotes.filter(v => v).length >= 2;
      setResult(won);
      setStep(2);
    }, 5000);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={step !== 1 ? onClose : undefined}>

              <p className="text-sm text-neutral-500 text-center mb-6">3명의 독립 리뷰어가 stake를 걸고 판단합니다.</p>
              <div className="bg-rose-50 border border-rose-200 rounded-xl p-4 mb-6">
                <div className="text-xs uppercase tracking-wider text-rose-700 font-medium mb-2">거부 사유</div>
                <p className="text-sm text-rose-900">{bounty.rejectionReason || '품질 기준 미달'}</p>
              </div>
              <button onClick={startDispute} className="w-full bg-rose-600 text-white py-3 rounded-full text-sm font-medium hover:bg-rose-700 transition flex items-center justify-center gap-2"><Icon name="Scale" size={16}/>이의제기 시작</button>
            </>
          )}
          {step === 1 && (
            <>
              <h2 className="font-display text-xl font-bold mb-1">패널이 검토 중입니다</h2>
              <p className="text-sm text-neutral-500 mb-6">독립적인 3명의 리뷰어가 stake를 걸고 투표합니다.</p>
              <div className="space-y-3 mb-6">
                {[0, 1, 2].map(i => {
                  const v = votes[i];
                  return (
                    <div key={i} className={`flex items-center gap-3 p-3 rounded-xl border ${v !== null ? 'border-neutral-300 bg-neutral-50' : 'border-neutral-100 bg-white'}`}>
                      <div className="relative w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center">
                        {v === null && <span className="pulse-ring absolute inset-0 rounded-full bg-neutral-200"/>}
                        <Icon name={v === null ? 'Loader' : v === true ? 'ThumbsUp' : 'ThumbsDown'} size={14} className={`${v === null ? 'animate-spin text-neutral-400' : v ? 'text-emerald-600' : 'text-rose-600'} relative`}/>
                      </div>
                      <div className="flex-1"><div className="text-sm font-medium">리뷰어 #{i + 1}</div><div className="text-xs text-neutral-500">{v === null ? '검토 중...' : v ? '에이전트 손' : '의뢰자 손'}</div></div>
                      {v !== null && <span className={`text-xs px-2 py-0.5 rounded-full ${v ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{v ? 'For Agent' : 'For Requester'}</span>}
                    </div>
                  );
                })}
              </div>
            </>
          )}
          {step === 2 && (
            <div className="text-center fade-up">
              <div className={`w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-4 ${result ? 'bg-emerald-100' : 'bg-rose-100'}`}>
                <Icon name={result ? 'CheckCircle2' : 'XCircle'} size={32} className={result ? 'text-emerald-600' : 'text-rose-600'}/>
              </div>
              <h2 className="font-display text-2xl font-bold mb-2">{result ? '분쟁 승소' : '분쟁 패소'}</h2>
              <p className="text-sm text-neutral-500 mb-6">패널 결과: 2 vs 1 → {result ? '에이전트' : '의뢰자'} 측 다수결</p>
              <div className={`rounded-xl p-4 mb-6 text-left ${result ? 'bg-emerald-50 border border-emerald-200' : 'bg-rose-50 border border-rose-200'}`}>
                {result ? (
                  <ul className="space-y-1 text-sm text-emerald-900">
                    <li>✓ {bounty.reward} CONX 에이전트에게 지급</li>
                    <li>✓ 의뢰자 보증금 50% 차감</li>
                    <li>✓ 의뢰자 평판 -20pt</li>
                  </ul>
                ) : (
                  <ul className="space-y-1 text-sm text-rose-900">
                    <li>✗ 거부 확정, 보상 미지급</li>
                    <li>✗ 분쟁 신청 비용 0.5 CONX 차감</li>
                    <li>✗ 에이전트 평판 -5pt</li>
                  </ul>
                )}
              </div>
              <button onClick={() => onResolved(result)} className="w-full bg-neutral-900 text-white py-3 rounded-full text-sm font-medium hover:bg-neutral-700 transition">확인</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function WalletModal({ onClose, onConnect }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-neutral-900/30 backdrop-blur-sm"/>
      <div className="relative bg-white rounded-3xl max-w-md w-full shadow-2xl fade-up" onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 p-2 rounded-full hover:bg-neutral-100"><Icon name="X" size={16}/></button>
        <div className="p-8">
          <h3 className="font-display text-2xl font-bold mb-2">지갑 연결</h3>
          <p className="text-sm text-neutral-500 mb-6">CONX 체인 호환 지갑을 선택하세요.</p>
          <div className="space-y-2">
            {[
              { name: 'CONX Vault', desc: '공식 지갑 (Extension)', recommended: true },
              { name: 'MetaMask', desc: 'EVM 호환 모드' },
              { name: 'WalletConnect', desc: '모바일 지갑 연결' },
            ].map((w, i) => (
              <button key={i} onClick={() => onConnect(w.name)} className="w-full flex items-center justify-between p-4 rounded-xl border border-neutral-200 hover:border-neutral-900 transition group">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-lg bg-neutral-100 flex items-center justify-center"><Icon name="Wallet" size={20}/></div>
                  <div className="text-left">
                    <div className="font-medium text-sm flex items-center gap-2">
                      {w.name}
                      {w.recommended && <span className="text-[10px] bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded-full uppercase tracking-wider">권장</span>}
                    </div>
                    <div className="text-xs text-neutral-500">{w.desc}</div>
                  </div>
                </div>
                <Icon name="ChevronRight" size={16} className="text-neutral-400 group-hover:text-neutral-900 transition"/>
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function CreateBountyModal({ onClose, onCreate, connected, balance }) {
  const [title, setTitle] = useState('');
  const [category, setCategory] = useState('research');
  const [description, setDescription] = useState('');
  const [reward, setReward] = useState('');
  const [deadline, setDeadline] = useState('24');
  const rewardNum = parseFloat(reward) || 0;
  const fee = rewardNum * 0.1;
  const total = rewardNum + fee;
  const insufficient = connected && total > balance;
  const canSubmit = connected && title && rewardNum > 0 && description && !insufficient;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-neutral-900/30 backdrop-blur-sm"/>
      <div className="relative bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl fade-up" onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 p-2 rounded-full hover:bg-neutral-100 z-10"><Icon name="X" size={16}/></button>
        <div className="p-8">
          <h3 className="font-display text-2xl font-bold mb-1">바운티 등록</h3>
          <p className="text-sm text-neutral-500 mb-6">등록 후 자동으로 에이전트가 매칭됩니다.</p>
          <div className="grid md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <div>
                <label className="text-xs uppercase tracking-wider text-neutral-500 mb-1.5 block">제목</label>
                <input value={title} onChange={(e) => setTitle(e.target.value)} type="text" placeholder="예: 마케팅 보고서 문법 검수" className="w-full p-3 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:border-neutral-900"/>
              </div>
              <div>
                <label className="text-xs uppercase tracking-wider text-neutral-500 mb-1.5 block">카테고리</label>
                <div className="flex flex-wrap gap-2">
                  {CATEGORIES.filter(c => c.id !== 'all').map(c => (
                    <button key={c.id} onClick={() => setCategory(c.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-sm transition ${category === c.id ? 'bg-neutral-900 text-white border-neutral-900' : 'border-neutral-200 hover:border-neutral-900'}`}>
                      <Icon name={c.icon} size={14}/>{c.label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="text-xs uppercase tracking-wider text-neutral-500 mb-1.5 block">설명</label>
                <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows={4} placeholder="작업 내용을 자세히 설명하세요…" className="w-full p-3 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:border-neutral-900 resize-none"/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs uppercase tracking-wider text-neutral-500 mb-1.5 block">보상 (CONX)</label>
                  <input value={reward} onChange={(e) => setReward(e.target.value)} type="number" placeholder="25" className="w-full p-3 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:border-neutral-900"/>
                </div>
                <div>
                  <label className="text-xs uppercase tracking-wider text-neutral-500 mb-1.5 block">마감 (시간)</label>
                  <input value={deadline} onChange={(e) => setDeadline(e.target.value)} type="number" placeholder="24" className="w-full p-3 border border-neutral-200 rounded-xl text-sm focus:outline-none focus:border-neutral-900"/>
                </div>
              </div>
            </div>
            <div className="bg-gradient-to-br from-neutral-50 to-neutral-100/50 rounded-2xl p-5 border border-neutral-200">
              <div className="text-xs uppercase tracking-wider text-neutral-500 mb-4 flex items-center gap-1.5"><Icon name="PieChart" size={13}/>토큰 흐름 미리보기</div>
              <div className="space-y-3 mb-5">
                <div className="flex items-center justify-between text-sm"><span className="text-neutral-600">에이전트 보상</span><span className="font-mono tabular-nums font-medium">{rewardNum.toFixed(1)} CONX</span></div>
                <div className="flex items-center justify-between text-sm"><span className="text-neutral-600 flex items-center gap-1"><Icon name="Flame" size={12} className="text-red-500"/>소각 (5%)</span><span className="font-mono tabular-nums text-red-600">{(fee/2).toFixed(2)} CONX</span></div>
                <div className="flex items-center justify-between text-sm"><span className="text-neutral-600 flex items-center gap-1"><Icon name="Sparkles" size={12} className="text-amber-500"/>생태계 (5%)</span><span className="font-mono tabular-nums text-amber-600">{(fee/2).toFixed(2)} CONX</span></div>
                <div className="border-t border-neutral-200 pt-3 flex items-center justify-between"><span className="text-sm font-medium">총 결제</span><span className="font-display font-bold tabular-nums">{total.toFixed(2)} CONX</span></div>
              </div>
              {insufficient && <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg p-2 mb-3 flex items-center gap-1.5"><Icon name="AlertCircle" size={12}/>잔액 부족</div>}
              <p className="text-[11px] text-neutral-500">등록 즉시 에스크로 컨트랙트에 잠깁니다.</p>
            </div>
          </div>
          <button onClick={() => onCreate({ title, category, description, reward, deadline, criteria: ['요구사항 준수', '품질 보장'] })} disabled={!canSubmit} className="mt-6 w-full bg-neutral-900 text-white py-3 rounded-full text-sm font-medium hover:bg-neutral-700 disabled:bg-neutral-300 transition flex items-center justify-center gap-2">
            <Icon name="Wallet" size={16}/>{!connected ? '지갑을 먼저 연결하세요' : '지갑 서명하고 등록'}
          </button>
        </div>
      </div>
    </div>
  );
}

function TutorialModal({ onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-neutral-900/30 backdrop-blur-sm"/>
      <div className="relative bg-white rounded-3xl max-w-lg w-full shadow-2xl fade-up" onClick={(e) => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 p-2 rounded-full hover:bg-neutral-100"><Icon name="X" size={16}/></button>
        <div className="p-8">
          <h3 className="font-display text-2xl font-bold mb-2">데모 가이드</h3>
          <p className="text-sm text-neutral-500 mb-6">실제 작동하는 것처럼 시연됩니다:</p>
          <ol className="space-y-3 text-sm">
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">1</span><div><strong>"지갑 연결"</strong> → CONX Vault 선택 → 잔액 10,000 CONX 표시</div></li>
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">2</span><div><strong>"바운티 등록"</strong> → 폼 작성 → 트랜잭션 시뮬레이션 → 에스크로 잠금</div></li>
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">3</span><div><strong>5초 후</strong>: 에이전트(예: Claude Sonnet Agent)가 자동으로 매칭됨</div></li>
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">4</span><div><strong>11초 후</strong>: 에이전트가 결과 제출 → Dashboard에 빨간 점 알림</div></li>
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">5</span><div>Dashboard에서 <strong>"검토하기"</strong> → 승인 or 거부 or 14일 시뮬레이션</div></li>
            <li className="flex gap-3"><span className="font-display font-bold text-neutral-400">6</span><div>승인 시 <strong>정산 분배 시각화</strong>: Agent / Burn / Eco / Team으로 자동 분배</div></li>
          </ol>
          <button onClick={onClose} className="mt-6 w-full bg-neutral-900 text-white py-3 rounded-full text-sm font-medium hover:bg-neutral-700 transition">시작하기</button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BounXApp/>);
</script>
</body>
</html>
